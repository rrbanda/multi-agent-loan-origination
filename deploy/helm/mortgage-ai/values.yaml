# Default values for mortgage-ai
#
# Override patterns:
#   External DB:        --set database.enabled=false
#                       --set secrets.DATABASE_URL=postgresql+asyncpg://...
#   External Keycloak:  --set keycloak.enabled=false
#                       --set secrets.KEYCLOAK_URL=https://...
#   External MinIO/S3:  --set minio.enabled=false
#                       --set secrets.S3_ENDPOINT=https://...
global:
  imageRegistry: quay.io
  imageRepository: rh-ai-quickstart
  imageTag: "latest"
  imagePullPolicy: Always
  storageClass: ""

# Secrets -- override these for real deployments via --set or external Secret
secrets:
  # Database secrets
  POSTGRES_DB: "mortgage-ai"
  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "changeme"

  # API secrets
  DATABASE_URL: "postgresql+asyncpg://user:changeme@mortgage-ai-db:5432/mortgage-ai"
  COMPLIANCE_DATABASE_URL: "postgresql+asyncpg://compliance_app:compliance_pass@mortgage-ai-db:5432/mortgage-ai"
  DEBUG: "false"
  ALLOWED_HOSTS: '["*"]'
  COMPANY_NAME: "Red Hat AI Quickstart Demo"
  AGENT_NAME: ""

  # Auth (Keycloak) -- set AUTH_DISABLED=true to bypass for demo
  AUTH_DISABLED: "false"
  KEYCLOAK_URL: "http://keycloak:8080"
  KEYCLOAK_ISSUER: ""
  KEYCLOAK_REALM: "mortgage-ai"
  KEYCLOAK_CLIENT_ID: "mortgage-ai-ui"
  JWKS_CACHE_TTL: "300"

  # Storage (S3 / MinIO)
  S3_ENDPOINT: "http://minio:9000"
  S3_ACCESS_KEY: "minio"
  S3_SECRET_KEY: "miniosecret"
  S3_BUCKET: "documents"
  S3_REGION: "us-east-1"
  UPLOAD_MAX_SIZE_MB: "50"

  # LLM
  LLM_API_KEY: "not-needed"
  LLM_BASE_URL: "http://vllm:8000/v1"
  LLM_MODEL: "gpt-4o-mini"

  # Vision model (optional -- falls back to main LLM when empty)
  VISION_MODEL: ""
  VISION_BASE_URL: ""
  VISION_API_KEY: ""
  # Embedding model -- defaults to in-process sentence-transformers.
  # Leave these empty to use the built-in local provider (no external
  # service needed). To use a remote OpenAI-compatible endpoint instead,
  # set EMBEDDING_PROVIDER to "openai_compatible" and provide the URL.
  EMBEDDING_MODEL: ""
  EMBEDDING_PROVIDER: ""
  EMBEDDING_BASE_URL: ""
  EMBEDDING_API_KEY: ""

  # MCP risk server
  MCP_RISK_SERVER_URL: "http://mcp-risk-server:8081/mcp"
  PREDICTIVE_MODEL_MCP_URL: ""

  # NeMo Guardrails (safety shields)
  # Auto-populated when nemoGuardrails.enabled=true (points to in-cluster service).
  # Set explicitly to use an external NeMo Guardrails server.
  NEMO_GUARDRAILS_ENDPOINT: ""

  # Observability (MLflow) -- leave blank to disable MLflow tracing
  MLFLOW_TRACKING_URI: ""
  MLFLOW_EXPERIMENT_NAME: ""
  MLFLOW_WORKSPACE: ""
  MLFLOW_TRACKING_TOKEN: ""
  MLFLOW_TRACKING_AUTH: ""
  MLFLOW_TRACKING_INSECURE_TLS: "false"

  # Kagenti A2A
  KAGENTI_ENABLED: "false"

  # Admin panel
  SQLADMIN_USER: "admin"
  SQLADMIN_PASSWORD: "admin"
  SQLADMIN_SECRET_KEY: "change-me-in-production"

  # Keycloak admin
  KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
  KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"

  # MinIO
  MINIO_ROOT_USER: "minio"
  MINIO_ROOT_PASSWORD: "miniosecret"

# OpenShift Routes configuration
routes:
  enabled: true
  annotations: {}
  sharedHost: ""  # Set custom hostname or leave empty (will use ui.host fallback)
  ui:
    host: ""  # Used as fallback if sharedHost is empty
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  api:
    host: ""  # Ignored - uses sharedHost or ui.host
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

# API configuration
api:
  enabled: true
  name: mortgage-ai-api
  image:
    repository: mortgage-ai-api
    tag: latest
  service:
    type: ClusterIP
    port: 8000
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  healthCheck:
    enabled: true
    path: /health/
    initialDelaySeconds: 90
    periodSeconds: 10
# UI configuration
ui:
  enabled: true
  name: mortgage-ai-ui
  image:
    repository: mortgage-ai-ui
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  replicas: 1
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "250m"
  healthCheck:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
# Database configuration
database:
  enabled: true
  name: mortgage-ai-db
  image:
    repository: pgvector/pgvector
    tag: pg16
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
# Keycloak configuration
keycloak:
  enabled: true
  name: keycloak
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0"
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1536Mi"
      cpu: "1000m"

# MinIO configuration
minio:
  enabled: true
  name: minio
  image:
    repository: minio/minio
    tag: latest
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "384Mi"
      cpu: "500m"

# MLflow observability (RHOAI 3.4+)
# When kagenti.mlflow.autoManaged=true, the Kagenti Operator MLflow controller
# handles MLflow automatically: auto-discovers MLflow from the
# mlflows.mlflow.opendatahub.io CR, creates experiments, injects env vars,
# and configures RBAC. Manual RBAC and env var configuration below is skipped.
# Prerequisites for Kagenti-managed MLflow:
#   1. Enable MLflow in the DataScienceCluster (RHOAI 3.4+)
#   2. Install Kagenti with MLflow controller enabled
#   3. Agents use mlflow[kubernetes]>=3.11 SDK
mlflow:
  # RBAC resources for MLflow server access (skipped when kagenti.mlflow.autoManaged=true)
  rbac:
    enabled: true  # Enable when deploying with RHOAI MLflow
    # Creates: ClusterRole, ServiceAccount, ClusterRoleBinding
    # The ServiceAccount can be used to generate tokens for MLflow auth
    pipelineRunner:
      enabled: false  # Enable when DSPA is deployed in this namespace
      serviceAccountName: pipeline-runner-dspa  # SA created by DSPA operator

# MCP Risk Server (optional)
mcpRiskServer:
  enabled: true
  name: mcp-risk-server
  image:
    repository: mortgage-ai-api
    tag: latest
  replicas: 1
  service:
    type: ClusterIP
    port: 8081
  healthCheck:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# LlamaStack model serving
llamastack:
  enabled: false
  image:
    repository: llamastack/distribution-starter
    tag: latest
  # InferenceService support (OpenShift AI / KServe)
  inferenceService:
    enabled: false
    endpoint: ""
    # Optional: name of existing K8s Secret with 'token' key
    authTokenSecret: ""
  safety:
    enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "768Mi"
      cpu: "500m"

# NeMo Guardrails (TrustyAI operator)
nemoGuardrails:
  enabled: false

  # Main LLM that NeMo uses for response generation
  llm:
    baseUrl: ""              # e.g. https://maas.apps.example.com/prelude-maas/llama-4-scout/v1
    modelName: ""            # e.g. llama-4-scout-17b-16e-w4a16
    apiKey: ""               # API key for the main LLM endpoint

  # Content safety detector model (NemoGuard 8B via vLLM)
  contentSafety:
    deploy: true             # Deploy ServingRuntime + InferenceService in this namespace
    modelPath: "llama-3.1-nemoguard-8b-content-safety-merged"
    runtime:
      image: "registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:ec799bb5eeb7e25b4b25a8917ab5161da6b6f1ab830cbba61bba371cffb0c34d"
    gpu:
      resourceType: "nvidia.com/mig-2g.35gb"
      count: "1"
    # S3 storage for model weights (must contain the model at modelPath)
    storage:
      endpoint: ""           # e.g. http://minio-llms.voice-agents.svc.cluster.local:9000
      bucket: "llms"
      accessKey: ""
      secretKey: ""
      region: "us-south"

  # nginx proxy (HTTP->HTTPS bridging for MaaS, indirection for content safety)
  proxy:
    enabled: true
    image: "registry.redhat.io/ubi10/nginx-126:10.1"
    # MaaS LLM proxy: rewrites /v1/* to /<pathPrefix>/v1/*
    maas:
      upstream: ""           # e.g. https://maas.apps.example.com
      pathPrefix: ""         # e.g. prelude-maas/llama-4-scout-17b-16e-w4a16
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

# Kagenti A2A integration
kagenti:
  enabled: false
  a2aBasePort: 8080
  inboundPortsExclude: "8000"
  outboundPortsExclude: "5432,9000,8081"
  # When true, delegate MLflow RBAC + env var injection to the Kagenti Operator
  # MLflow controller. Requires Kagenti version with MLflow controller support.
  # Keep false until the Kagenti MLflow controller is available in your cluster.
  mlflow:
    autoManaged: false

# Seed data (demo data for demos / dev environments)
seed:
  enabled: false

# ServiceAccount
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context
podSecurityContext: {}

# Security Context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
