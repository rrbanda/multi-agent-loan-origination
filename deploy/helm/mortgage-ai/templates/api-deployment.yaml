{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.api.name }}
  labels:
    {{- include "mortgage-ai.api.labels" . | nindent 4 }}
    {{- if .Values.kagenti.enabled }}
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    {{- end }}
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"apps/v1","kind":"StatefulSet","name":"{{ .Values.database.name }}"},{"apiVersion":"apps/v1","kind":"Deployment","name":"{{ .Values.keycloak.name }}"},{"apiVersion":"apps/v1","kind":"Deployment","name":"{{ .Values.minio.name }}"}]'
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "mortgage-ai.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mortgage-ai.api.selectorLabels" . | nindent 8 }}
        monitoring.opendatahub.io/scrape: 'true'
        {{- if .Values.kagenti.enabled }}
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
        {{- end }}
      {{- if .Values.kagenti.enabled }}
      annotations:
        kagenti.io/inject: "enabled"
        kagenti.io/spire: "enabled"
        kagenti.io/inbound-ports-exclude: {{ .Values.kagenti.inboundPortsExclude | quote }}
        kagenti.io/outbound-ports-exclude: {{ .Values.kagenti.outboundPortsExclude | quote }}
      {{- end }}
    spec:
      {{- if and .Values.mlflow.rbac.enabled (not (dig "mlflow" "autoManaged" false .Values.kagenti)) }}
      serviceAccountName: {{ include "mortgage-ai.fullname" . }}-mlflow-client
      {{- else }}
      serviceAccountName: {{ include "mortgage-ai.serviceAccountName" . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if .Values.database.enabled }}
        - name: wait-for-database
          image: postgres:16-alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for database to be ready..."
              until pg_isready -h {{ .Values.database.name }} -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "Database not ready, waiting..."
                sleep 5
              done
              echo "Database is ready!"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: POSTGRES_DB
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: POSTGRES_PASSWORD
        - name: run-migrations
          image: {{ include "mortgage-ai.image" (dict "name" .Values.api.image.repository "tag" .Values.api.image.tag "Values" .Values) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              cd /app/packages/db && alembic upgrade head
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: DATABASE_URL
            - name: PYTHONPATH
              value: "/app/packages/db/src:/app/packages/api/src"
        {{- end }}
      containers:
        - name: api
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "mortgage-ai.image" (dict "name" .Values.api.image.repository "tag" .Values.api.image.tag "Values" .Values) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            {{- if .Values.kagenti.enabled }}
            {{- range $i, $name := list "public" "borrower" "lo" "uw" "ceo" }}
            - name: a2a-{{ $name }}
              containerPort: {{ add $.Values.kagenti.a2aBasePort $i }}
              protocol: TCP
            {{- end }}
            {{- end }}
          env:
            {{- if .Values.database.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: DATABASE_URL
            {{- end }}
            - name: COMPLIANCE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: COMPLIANCE_DATABASE_URL
            - name: DEBUG
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: DEBUG
            - name: COMPANY_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: COMPANY_NAME
            - name: AGENT_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: AGENT_NAME
            - name: ALLOWED_HOSTS
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: ALLOWED_HOSTS
            - name: AUTH_DISABLED
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: AUTH_DISABLED
            - name: KEYCLOAK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_ISSUER
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: KEYCLOAK_ISSUER
            - name: KEYCLOAK_REALM
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: KEYCLOAK_CLIENT_ID
            - name: JWKS_CACHE_TTL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: JWKS_CACHE_TTL
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: S3_ENDPOINT
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: S3_SECRET_KEY
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: S3_BUCKET
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: S3_REGION
            - name: UPLOAD_MAX_SIZE_MB
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: UPLOAD_MAX_SIZE_MB
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: LLM_API_KEY
            - name: LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: LLM_BASE_URL
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: LLM_MODEL
            - name: VISION_MODEL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: VISION_MODEL
            - name: VISION_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: VISION_BASE_URL
            - name: VISION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: VISION_API_KEY
            - name: EMBEDDING_MODEL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: EMBEDDING_MODEL
            - name: EMBEDDING_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: EMBEDDING_PROVIDER
            - name: EMBEDDING_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: EMBEDDING_BASE_URL
            - name: EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: EMBEDDING_API_KEY
            - name: MCP_RISK_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: MCP_RISK_SERVER_URL
            - name: PREDICTIVE_MODEL_MCP_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: PREDICTIVE_MODEL_MCP_URL
            - name: NEMO_GUARDRAILS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: NEMO_GUARDRAILS_ENDPOINT
            {{- if not (dig "mlflow" "autoManaged" false .Values.kagenti) }}
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: MLFLOW_TRACKING_URI
            - name: MLFLOW_EXPERIMENT_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: MLFLOW_EXPERIMENT_NAME
            - name: MLFLOW_WORKSPACE
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: MLFLOW_WORKSPACE
            - name: MLFLOW_TRACKING_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: MLFLOW_TRACKING_TOKEN
            - name: MLFLOW_TRACKING_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: MLFLOW_TRACKING_AUTH
            - name: MLFLOW_TRACKING_INSECURE_TLS
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: MLFLOW_TRACKING_INSECURE_TLS
            {{- end }}
            - name: SQLADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: SQLADMIN_USER
            - name: SQLADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: SQLADMIN_PASSWORD
            - name: SQLADMIN_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: SQLADMIN_SECRET_KEY
            - name: KAGENTI_ENABLED
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: KAGENTI_ENABLED
            - name: KAGENTI_SERVICE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "mortgage-ai.fullname" . }}-secret
                  key: KAGENTI_SERVICE_NAME
          {{- if .Values.api.healthCheck.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.api.healthCheck.path }}
              port: http
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.api.healthCheck.path }}
              port: http
            periodSeconds: {{ .Values.api.healthCheck.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.healthCheck.path }}
              port: http
            periodSeconds: {{ .Values.api.healthCheck.periodSeconds }}
          {{- end }}
          {{- if .Values.kagenti.enabled }}
          volumeMounts:
            - name: svid-output
              mountPath: /spiffe
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- if .Values.kagenti.enabled }}
      volumes:
        - name: svid-output
          emptyDir: {}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
